name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SSH deploy to prod
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 203.57.50.240
          port: 2222
          username: root
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            cd /var/www/crossbench

            echo "=== Pulling latest ==="
            git pull origin main

            echo "=== Installing dependencies ==="
            npm ci --prefer-offline

            echo "=== Generating Prisma client ==="
            npx prisma generate

            echo "=== Building ==="
            npm run build

            echo "=== Restarting ==="
            pm2 restart crossbench

            echo "=== Done ==="
            pm2 show crossbench | grep -E "status|uptime|restart"
