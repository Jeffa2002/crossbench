name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to prod
    runs-on: [self-hosted, per-web, crossbench-prod]
    timeout-minutes: 10

    steps:
      - name: Deploy on production runner
        run: |
          set -euo pipefail
          cd /var/www/crossbench

          echo "=== Pulling latest ==="
          git fetch origin main
          git merge --ff-only origin/main

          echo "=== Installing dependencies ==="
          npm ci --prefer-offline

          echo "=== Generating Prisma client ==="
          npx prisma generate

          echo "=== Building ==="
          npm run build

          echo "=== Restarting ==="
          pm2 restart crossbench || pm2 start npm --name crossbench -- start -- -p 3006
          pm2 save

          echo "=== Done ==="
          pm2 show crossbench | grep -E "status|uptime|restart"
